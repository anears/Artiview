# Cross-platform builds: every PR gets macOS/Linux/Windows bundles as
# artifacts; pushing a v* tag additionally creates a draft GitHub release
# with the bundles attached (publish it manually after a smoke test).
name: Build

# The tag path creates a draft release, which needs a writable token.
permissions:
  contents: write

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest # Apple Silicon
          - ubuntu-22.04
          - windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf rpm libfuse2

      # The vendored OpenSSL build (ssh2) needs NASM on MSVC.
      - name: Install NASM
        if: matrix.platform == 'windows-latest'
        uses: ilammy/setup-nasm@v1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build (and release on tags)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Artiview {0}', github.ref_name) || '' }}
          releaseDraft: true

      - name: Upload bundles as workflow artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: artiview-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
